---
layout: default
title: Blog
---
<section>
    <header class="major">
        <h2>Blog</h2>
    </header>
    <div class="posts">
        {% for post in site.posts %}
        <article>
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            <p>{{ post.content | strip_html | truncatewords: 50 }}</p>
            <ul class="actions">
                <li><a href="{{ post.url }}" class="button">More</a></li>
            </ul>
        </article>
        {% endfor %}
    </div>
</section>
